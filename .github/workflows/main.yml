name: Procesar Reporte Banrep

on:
  workflow_dispatch:
    inputs:
      file_id:
        description: 'ID del archivo enviado desde n8n'
        required: true
      # ESTE ES EL NUEVO INPUT PARA LA URL DINÁMICA
      webhook_url:
        description: 'URL dinámica de n8n para responder (resumeUrl)'
        required: true

jobs:
  ejecutar-proceso:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar el código
        uses: actions/checkout@v3

      - name: 2. Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 3. Instalar dependencias y OpenSSL
        run: |
          sudo apt-get update
          sudo apt-get install -y openssl
          pip install google-api-python-client google-auth

      - name: 4. Ejecutar el script
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          ID_ARCHIVO_DRIVE: ${{ github.event.inputs.file_id }}
        run: python main.py
      
      # NOTIFICAR ÉXITO USANDO LA URL DINÁMICA
      - name: Reportar Exito a n8n
        if: success()
        run: |
          curl -X POST ${{ github.event.inputs.webhook_url }} \
          -H "Content-Type: application/json" \
          -d '{
            "status": "success", 
            "message": "Transformacion exitosa. El archivo ya esta en la carpeta de salida.",
            "file_id": "${{ github.event.inputs.file_id }}"
          }'

      # NOTIFICAR ERROR USANDO LA URL DINÁMICA
      - name: Reportar Fallo a n8n
        if: failure()
        run: |
          curl -X POST ${{ github.event.inputs.webhook_url }} \
          -H "Content-Type: application/json" \
          -d '{
            "status": "error", 
            "message": "Fallo tecnico en el procesamiento. Revisar logs de GitHub Actions.",
            "file_id": "${{ github.event.inputs.file_id }}"
          }'
